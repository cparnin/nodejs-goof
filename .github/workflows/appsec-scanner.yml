name: AppSec Scanner

# Simple, focused security workflow for automated vulnerability scanning
# Features: SAST, Secrets, Dependencies, and optional AI-powered auto-fix

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          
      - name: Install Gitleaks
        run: |
          wget -O gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
      - name: Install AppSec Scanner
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            pip install openai python-dotenv jinja2 requests
          fi
          
      - name: Run SAST Analysis
        run: |
          mkdir -p security-reports
          semgrep --config=p/security-audit --config=p/owasp-top-10 --json --output=security-reports/semgrep-results.json . || true
          
      - name: Run Secret Detection
        run: |
          gitleaks detect --report-format=json --report-path=security-reports/gitleaks-results.json --no-git . || true
          
      - name: Run Dependency Analysis
        run: |
          trivy fs --format=json --output=security-reports/trivy-results.json --severity=CRITICAL,HIGH . || true
          
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-reports/results.sarif
        continue-on-error: true
          
      - name: Run AppSec Scanner Analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -f "src/main.py" ]; then
            echo "Running AppSec Scanner..."
            python src/main.py
          else
            echo "AppSec Scanner source not found. Install by copying src/ directory to your repo."
          fi
          
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: security-reports/
          retention-days: 30
          
      - name: Security Gate
        run: |
          # Simple security gate - fail on critical findings
          if [ -f "security-reports/semgrep-results.json" ]; then
            critical_count=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' security-reports/semgrep-results.json || echo "0")
            if [ "$critical_count" -gt 0 ]; then
              echo "❌ Found $critical_count critical security findings"
              echo "Please review the security reports and fix critical issues"
              exit 1
            fi
          fi
          
          if [ -f "security-reports/gitleaks-results.json" ]; then
            secrets_count=$(jq 'length' security-reports/gitleaks-results.json || echo "0")
            if [ "$secrets_count" -gt 0 ]; then
              echo "❌ Found $secrets_count hardcoded secrets"
              echo "Please remove secrets from your code"
              exit 1
            fi
          fi
          
          echo "✅ Security scan passed - no critical issues found"
          
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 🔒 Security Scan Results\n\n';
            
            // Read executive summary if available
            if (fs.existsSync('security-reports/executive-summary.md')) {
              const summary = fs.readFileSync('security-reports/executive-summary.md', 'utf8');
              comment += summary;
            } else {
              comment += 'Security scan completed. Check the uploaded artifacts for detailed results.\n\n';
            }
            
            comment += '**Tools Used:**\n';
            comment += '- 🔍 Semgrep (SAST)\n';
            comment += '- 🔑 Gitleaks (Secrets)\n';
            comment += '- 📦 Trivy (Dependencies)\n\n';
            
            if (!process.env.OPENAI_API_KEY) {
              comment += '**Note:** Add `OPENAI_API_KEY` to repository secrets for AI-powered analysis and auto-fix.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });